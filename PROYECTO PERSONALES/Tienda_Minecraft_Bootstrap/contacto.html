<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Contacto - Minecraft Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>

    <!-- CSS propio -->
    <link rel="stylesheet" href="Estilo.css" />
  </head>

  <body id="pagina-contacto">
    <div class="overlay">
      <!-- NAVBAR -->
      <nav class="navbar navbar-expand-lg navbar-light bg-light rounded mb-4">
        <div class="container">
          <a class="navbar-brand fw-bold" href="index.html">Minecraft Store</a>
          <div class="navbar-nav">
            <a class="nav-link" href="index.html">Inicio</a>
            <a class="nav-link" href="producto.html">Productos</a>
            <a class="nav-link" href="contacto.html">Contacto</a>
          </div>
        </div>
      </nav>

      <!-- FORMULARIO -->
      <main class="container" style="max-width: 400px">
        <h2 class="text-center mb-4">Formulario de Contacto</h2>

        <form
          onsubmit="
            alert('Mensaje enviado correctamente');
            return false;
          "
        >
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Mensaje</label>
            <textarea class="form-control" rows="4" required></textarea>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" required />
            <label class="form-check-label">
              Acepto los términos y condiciones
            </label>
          </div>

          <button class="btn btn-dark w-100">Enviar</button>
        </form>
      </main>

      <!-- FOOTER -->
      <footer class="text-center mt-5">
        <p>&copy; 2025 Tienda Online Minecraft</p>
      </footer>
    </div>
  </body>
</html>
