<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Productos - Minecraft Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>

    <!-- CSS propio -->
    <link rel="stylesheet" href="Estilo.css" />
  </head>

  <body id="pagina-producto">
    <div class="overlay">
      <!-- NAVBAR -->
      <nav class="navbar navbar-expand-lg navbar-light bg-light rounded mb-4">
        <div class="container">
          <a class="navbar-brand fw-bold" href="index.html">Minecraft Store</a>
          <div class="navbar-nav">
            <a class="nav-link" href="index.html">Inicio</a>
            <a class="nav-link" href="producto.html">Productos</a>
            <a class="nav-link" href="contacto.html">Contacto</a>
          </div>
        </div>
      </nav>

      <!-- PRODUCTOS -->
      <main class="container">
        <div class="row g-4">
          <!-- Producto -->
          <div class="col-md-4 col-lg-3">
            <div class="card h-100">
              <img
                src="./imagenes/camiseta.jpg"
                class="card-img-top"
                alt="Camiseta Minecraft"
              />
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">Camiseta Minecraft</h5>
                <p class="card-text">Diseño pixelado oficial.</p>
                <p class="fw-bold">15,99 €</p>
                <a href="#" class="btn btn-dark mt-auto">Agregar al carrito</a>
              </div>
            </div>
          </div>

          <div class="col-md-4 col-lg-3">
            <div class="card h-100">
              <img
                src="./imagenes/botella.jpg"
                class="card-img-top"
                alt="Botella Minecraft"
              />
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">Botella Minecraft</h5>
                <p class="card-text">Botella reutilizable temática.</p>
                <p class="fw-bold">9,99 €</p>
                <a href="#" class="btn btn-dark mt-auto">Agregar al carrito</a>
              </div>
            </div>
          </div>

          <div class="col-md-4 col-lg-3">
            <div class="card h-100">
              <img
                src="./imagenes/lampara.jpg"
                class="card-img-top"
                alt="Lámpara Minecraft"
              />
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">Lámpara Minecraft</h5>
                <p class="card-text">Iluminación estilo cubo.</p>
                <p class="fw-bold">25,00 €</p>
                <a href="#" class="btn btn-dark mt-auto">Agregar al carrito</a>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- FOOTER -->
      <footer class="text-center mt-5">
        <p>&copy; 2025 Tienda Online Minecraft</p>
      </footer>
    </div>
  </body>
</html>
