<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto - Tienda Lego</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-light" id="pagina-contacto">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">TIENDA LEGO</a>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="producto.html">Productos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="contacto.html">Contacto</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- FORMULARIO -->
    <main class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-10 col-md-6">
          <h2 class="text-center mb-4">Contacto</h2>

          <form
            onsubmit="
              alert('Gracias, contactaremos contigo pronto');
              return false;
            "
          >
            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Nombre"
                required
              />
            </div>

            <div class="mb-3">
              <input
                type="email"
                class="form-control"
                placeholder="Correo electrónico"
                required
              />
            </div>

            <div class="mb-3">
              <textarea
                class="form-control"
                rows="4"
                placeholder="Mensaje"
                required
              ></textarea>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" required />
              <label class="form-check-label">
                Acepto los términos y condiciones
              </label>
            </div>

            <button class="btn btn-dark w-100">Enviar</button>
          </form>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
      © 2025 Tienda GEMA. Todos los derechos reservados.
    </footer>
  </body>
</html>
